name: Build Windows Installer

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (CI)
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --config electron-builder.json

      - name: Verify build artifacts
        run: |
          if [ ! -d "release/build" ]; then
            echo "❌ Build directory not found"
            exit 1
          fi

          if [ ! "$(ls -A release/build/*.exe 2>/dev/null)" ]; then
            echo "❌ No .exe files found"
            exit 1
          fi

          echo "✅ Build artifacts verified"
          ls -la release/build/
        shell: bash

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/build/*.exe
            release/build/*.msi
            release/build/*.zip

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/build/*.exe
            release/build/*.msi
            release/build/*.zip
