<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StratoSort - AI-Powered File Organization</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' http://localhost:11434 ws://localhost:*; object-src 'none'; base-uri 'self'; form-action 'self';">
    <!-- Enhanced CSP: Allows Ollama API calls and WebSocket connections for HMR -->
    <script>
        // Global polyfill for webpack/electron compatibility
        if (typeof global === 'undefined') {
            window.global = window;
        }
    </script>
</head>
<body>
    <div id="react-root">
        <main class="layout-flex-center" style="height: 100vh; font-family: 'Inter', -apple-system, sans-serif;">
            <section class="text-center layout-stack" style="max-width: 400px;">
                <div class="animate-float" style="font-size: 48px; margin-bottom: 16px;" aria-hidden="true">🚀</div>
                <h1 class="text-heading-4" style="color: #334155; margin: 0;">Loading StratoSort</h1>
                <p class="text-body-small" style="color: #64748B; margin: 8px 0 0 0;">AI-Powered File Organization</p>
                <div class="mt-6" style="margin-top: 24px;">
                    <div class="loading-spinner" style="width: 24px; height: 24px; border: 2px solid #E2E8F0; border-top: 2px solid #2563EB; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                </div>
            </section>
        </main>
    </div>
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
    </style>
    
    <!-- Webpack will inject the script tags automatically -->
</body>
</html>
