name: CI

on:
  push:
    branches: [ main, master, develop, '**/feature/**', '**/fix/**' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --silent || true

      - name: Run tests
        env:
          CI: true
          NODE_ENV: test
          OLLAMA_BASE_URL: http://127.0.0.1:11434
        run: npm test -- --runInBand

      - name: Build (renderer)
        env:
          NODE_ENV: production
        run: npm run build

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Jest (quick)
        env:
          CI: true
          NODE_ENV: test
          OLLAMA_BASE_URL: http://127.0.0.1:11434
        run: npm test -- --bail --runInBand


