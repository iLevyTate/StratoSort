<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StratoSort - AI-Powered File Organization</title>
    <!-- CSP is set by the main process. Keeping meta minimal to avoid conflicts. -->
  </head>
  <body>
    <!-- Minimal loading screen -->
    <div
      id="initial-loading"
      style="
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      "
    >
      <div style="text-align: center">
        <!-- Elegant StratoSort logo/wordmark -->
        <div
          style="
            font-size: 32px;
            font-weight: 300;
            color: #1a1a1a;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
          "
        >
          StratoSort
        </div>
        <!-- Minimal progress indicator -->
        <div
          style="
            width: 24px;
            height: 24px;
            border: 2px solid #e5e5e5;
            border-top: 2px solid #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
          "
        ></div>
      </div>
    </div>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <!-- React root container (must be empty for React to work) -->
    <div id="root"></div>

    <!-- All animations/styles are defined in Tailwind CSS -->

    <!-- Webpack will inject the script tags automatically -->
  </body>
</html>
